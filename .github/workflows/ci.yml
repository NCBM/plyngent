name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pdm sync --dev

      - name: Ruff check
        run: pdm run ruff check --output-format=github .

      - name: Ruff format
        run: pdm run ruff format --check .

      - name: basedpyright
        run: pdm run basedpyright .

      - name: pytest
        run: pdm run pytest
